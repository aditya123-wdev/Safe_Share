<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-10 rounded-2xl border border-gray-700 w-96 text-center">
        <h2 class="text-2xl font-bold mb-6">Enter PIN to Download</h2>
        <input type="password" id="pinInput" placeholder="PIN" autocomplete="new-password" class="w-full bg-gray-700 p-3 rounded mb-6 text-center">
        <button onclick="startDownload()" class="bg-green-600 w-full py-3 rounded-full font-bold">Download File</button>
    </div>
    <script>
        function startDownload() {
            const fileId = window.location.pathname.split('/').pop();
            const pin = document.getElementById('pinInput').value;
            window.location.href = `/api/files/download/${fileId}?pin=${pin}`;
        }
    </script>
</body>
</html>
