<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Link Expired | Safe-Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
    <div class="text-center p-10 bg-gray-800 rounded-3xl border border-gray-700 shadow-2xl max-w-md">
        <div class="text-6xl mb-6">🔒</div>
        <h1 class="text-3xl font-bold text-red-500 mb-4">Link Unavailable</h1>
        <p class="text-gray-400 mb-8">
            This secure link has either expired, reached its download limit, or never existed. 
            For security reasons, files are shredded immediately upon expiry.
        </p>
        <a href="index.html" class="inline-block bg-blue-600 px-8 py-3 rounded-full font-bold hover:bg-blue-500 transition-all">
            Upload New File
        </a>
    </div>
</body>
</html>
